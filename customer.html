<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grand Café - Table Service</title>
  <!-- SEO & Mobile App tags -->
  <meta name="description" content="Instant tableside customer service at Grand Café. Scan, tap, and receive service immediately.">
  <meta name="theme-color" content="#0c0805">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- Custom Brand Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Socket.io Client (loaded optionally, with fallback logic) -->
  <script src="/socket.io/socket.io.js" defer onerror="console.log('Socket.io library not found. Seamlessly falling back to browser-native BroadcastChannel API!')"></script>
</head>
<body>

  <!-- Animated Luxury Ambient Background -->
  <div class="ambient-bg-glow">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>
  </div>

  <div class="customer-container">
    
    <!-- Top Branded Header -->
    <header class="brand-header">
      <div class="brand-logo-container">
        <!-- Logo from workspace folder -->
        <img src="grand-logo.png" alt="Grand Café Logo" class="brand-logo" id="logo-img" onerror="this.src='https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&w=150&q=80';">
      </div>
      <p>How can we assist you today?</p>
    </header>

    <!-- Real-Time Request Status Tracker Panel -->
    <section class="guest-tracker-panel" id="trackerPanel" style="display: none;">
      <h4 class="tracker-heading"><span></span> Active Request Status</h4>
      <div class="tracker-cards-list" id="trackerList">
        <!-- Live status cards loaded dynamically -->
      </div>
    </section>

    <!-- Flat Digital Menu Container -->
    <div class="menu-container-flat">
      <!-- Modern Category Showcase Hero -->
      <div class="menu-hero-card" id="menuHeroCard"></div>

      <!-- Live Search Box -->
      <div class="menu-search-container">
        <div class="search-input-wrapper">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="cust-menu-search" placeholder="Search beverages, matcha, shake..." oninput="renderCustomerMenu()">
        </div>
      </div>

      <!-- Categories Pills (Horizontal Scrollable) -->
      <div class="cust-category-scroll">
        <button class="cust-category-pill active" id="pill-all" onclick="filterCustomerCategory('all')">✨ All Recipes</button>
        <button class="cust-category-pill" id="pill-hot-coffee" onclick="filterCustomerCategory('Hot Coffee')">☕ Hot Coffee</button>
        <button class="cust-category-pill" id="pill-iced-coffee" onclick="filterCustomerCategory('Iced Coffee')">🧊 Iced Coffee</button>
        <button class="cust-category-pill" id="pill-matcha" onclick="filterCustomerCategory('Matcha')">🍵 Matcha</button>
        <button class="cust-category-pill" id="pill-iced-tea" onclick="filterCustomerCategory('Iced Tea')">🍹 Iced Tea</button>
        <button class="cust-category-pill" id="pill-milkshakes" onclick="filterCustomerCategory('Milkshakes')">🥤 Milkshakes</button>
        <button class="cust-category-pill" id="pill-mojitos" onclick="filterCustomerCategory('Mojitos')">🌱 Mojitos</button>
        <button class="cust-category-pill" id="pill-lemonades" onclick="filterCustomerCategory('Lemonades')">🍋 Lemonades</button>
        <button class="cust-category-pill" id="pill-hot-chocolate" onclick="filterCustomerCategory('Hot Chocolate')">🍫 Cocoa</button>
      </div>

      <!-- Menu Items Grid Group -->
      <div class="menu-items-grid" id="customerMenuGrid">
        <!-- Rendered dynamically -->
      </div>
    </div>

    <!-- Branded Footer -->
    <footer class="customer-footer">
      <p>&copy; 2026 Grand Café. Crafted for visual luxury & speed.</p>
    </footer>

  </div>

  <!-- Premium Floating Tableside Service Widget -->
  <div class="floating-service-widget" id="floating-service-widget">
    <div class="widget-header">
      <div class="widget-table-info">
        <span class="widget-table-dot"></span>
        <span id="tableText">Detecting Table...</span>
      </div>
      <div class="widget-sync-status">Live Sync</div>
    </div>
    
    <div class="widget-actions">
      <!-- Call Waiter Pill -->
      <button class="widget-btn" id="btn-call_waiter" onclick="submitServiceRequest('call_waiter')">
        <span class="widget-btn-icon">🛎️</span>
        <span class="widget-btn-title">Waiter</span>
        <span class="widget-btn-ewt" id="ewt-call_waiter">Est: ~2 mins</span>
      </button>

      <!-- Bring Water Pill -->
      <button class="widget-btn" id="btn-bring_water" onclick="submitServiceRequest('bring_water')">
        <span class="widget-btn-icon">💧</span>
        <span class="widget-btn-title">Water</span>
        <span class="widget-btn-ewt" id="ewt-bring_water">Est: ~1.5 mins</span>
      </button>

      <!-- Ask for Bill Pill -->
      <button class="widget-btn" id="btn-ask_bill" onclick="submitServiceRequest('ask_bill')">
        <span class="widget-btn-icon">💵</span>
        <span class="widget-btn-title">Bill</span>
        <span class="widget-btn-ewt" id="ewt-ask_bill">Est: ~2 mins</span>
      </button>
    </div>
  </div>

  <!-- Elegant Non-Blocking Success Toast Notification -->
  <div class="toast-overlay" id="successToast">
    <div class="toast-content">
      <div class="success-ring-container" style="margin-bottom: 0;">
        <div class="success-ring" style="width: 36px; height: 36px; box-shadow: 0 0 10px var(--color-success-glow);">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
      </div>
      <div class="toast-texts" style="display: flex; flex-direction: column; gap: 2px;">
        <h3 id="successTitle" style="font-size: 0.95rem; font-weight: 600; margin: 0; color: #fff;">Request Sent!</h3>
        <p id="successMessage" style="font-size: 0.8rem; margin: 0; color: var(--color-cream-dim); line-height: 1.3;">Your request has been sent successfully.</p>
      </div>
    </div>
  </div>

  <!-- Custom Customer JS Script -->
  <script src="js/customer.js"></script>
</body>
</html>
